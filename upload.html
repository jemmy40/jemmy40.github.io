<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload NFT - DexPi NFT</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#ffffff;
color:#111;
}

/* ================= NAVBAR ================= */

.navbar{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:white;
border-bottom:1px solid #eee;
}

.logo{
font-size:32px;
font-weight:700;
color:#6f3cff;
}

.logo span{
color:#4da6ff;
}

.nav-links{
display:flex;
gap:30px;
align-items:center;
}

.nav-links a{
text-decoration:none;
color:#111;
font-weight:500;
transition:0.2s;
}

.nav-links a:hover{
color:#6f3cff;
}

/* ================= PAGE ================= */

.page{
max-width:900px;
margin:60px auto;
padding:20px;
}

.page-title{
font-size:52px;
margin-bottom:15px;
text-align:center;
}

.page-title span{
color:#6f3cff;
}

.page-subtitle{
text-align:center;
color:#666;
font-size:18px;
margin-bottom:50px;
line-height:1.7;
}

/* ================= FORM ================= */

.upload-box{
background:#f8f8ff;
padding:40px;
border-radius:30px;
border:1px solid #eee;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.form-group{
margin-bottom:30px;
}

.form-group label{
display:block;
margin-bottom:10px;
font-weight:600;
font-size:17px;
}

.form-input,
.form-textarea,
.form-select{
width:100%;
padding:16px;
border-radius:18px;
border:1px solid #ddd;
font-size:16px;
outline:none;
transition:0.2s;
background:white;
}

.form-input:focus,
.form-textarea:focus,
.form-select:focus{
border-color:#6f3cff;
}

.form-textarea{
resize:none;
height:140px;
}

.upload-area{
border:2px dashed #c9c9ff;
padding:50px 20px;
border-radius:25px;
text-align:center;
background:white;
cursor:pointer;
transition:0.2s;
}

.upload-area:hover{
background:#f3f3ff;
}

.upload-area input{
display:none;
}

.upload-icon{
font-size:55px;
margin-bottom:15px;
}

.upload-text{
font-size:18px;
font-weight:600;
margin-bottom:10px;
}

.upload-subtext{
color:#666;
font-size:14px;
}

.preview-box{
margin-top:20px;
text-align:center;
}

.preview-image{
max-width:250px;
border-radius:20px;
display:none;
margin:auto;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

/* ================= BUTTON ================= */

.upload-btn{
width:100%;
padding:18px;
background:#6f3cff;
color:white;
border:none;
border-radius:20px;
font-size:18px;
cursor:pointer;
transition:0.2s;
box-shadow:0 10px 20px rgba(111,60,255,0.2);
}

.upload-btn:hover{
transform:translateY(-3px);
background:#5f30ef;
}

/* ================= FOOTER ================= */

.footer{
margin-top:80px;
padding:50px 20px;
background:#f8f8ff;
text-align:center;
border-top:1px solid #eee;
}

.footer-logo{
font-size:35px;
font-weight:700;
color:#6f3cff;
margin-bottom:15px;
}

.footer-logo span{
color:#4da6ff;
}

.footer p{
color:#666;
}

/* ================= MOBILE ================= */

@media(max-width:850px){

.navbar{
flex-direction:column;
gap:20px;
padding:20px;
}

.nav-links{
flex-wrap:wrap;
justify-content:center;
}

.page-title{
font-size:40px;
}

.upload-box{
padding:25px;
}

}

</style>

</head>

<body>

<!-- ================= NAVBAR ================= -->

<div class="navbar">

<div class="logo">
DexPi <span>NFT</span>
</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="marketplace.html">Marketplace</a>
<a href="#">Collections</a>
<a href="#">My NFTs</a>
<a href="upload.html">Upload</a>
</div>

</div>

<!-- ================= PAGE ================= -->

<div class="page">

<h1 class="page-title">
Create Your <span>NFT</span>
</h1>

<p class="page-subtitle">
Upload your pixel art NFT and publish it on DexPi NFT marketplace.
</p>

<!-- ================= FORM ================= -->

<div class="upload-box">

<div class="form-group">

<label>
NFT Name
</label>

<input
type="text"
class="form-input"
placeholder="Example: Fire Elf"
/>

</div>

<div class="form-group">

<label>
Price (Pi)
</label>

<input
type="number"
class="form-input"
placeholder="Example: 10"
/>

</div>

<div class="form-group">

<label>
Rarity
</label>

<select class="form-select">

<option>
Common
</option>

<option>
Rare
</option>

<option>
Epic
</option>

<option>
Legendary
</option>

</select>

</div>

<div class="form-group">

<label>
Description
</label>

<textarea
class="form-textarea"
placeholder="Describe your NFT..."
></textarea>

</div>

<div class="form-group">

<label>
Upload Image
</label>

<label class="upload-area">

<div class="upload-icon">
🎨
</div>

<div class="upload-text">
Click to upload NFT image
</div>

<div class="upload-subtext">
PNG, JPG or pixel art image
</div>

<input
type="file"
id="fileInput"
accept="image/*"
/>

</label>

<div class="preview-box">

<img
id="preview"
class="preview-image"
/>

</div>

</div>

<button class="upload-btn" onclick="publishNFT()">
Publish NFT
</button>

</div>

</div>

<!-- ================= FOOTER ================= -->

<div class="footer">

<div class="footer-logo">
DexPi <span>NFT</span>
</div>

<p>
Create and trade pixel NFTs with Pi Network.
</p>

</div>

<!-- ================= SCRIPT ================= -->

<script>

/* ================= IMAGE PREVIEW ================= */

const fileInput =
document.getElementById("fileInput");

const preview =
document.getElementById("preview");

fileInput.addEventListener("change", function(){

const file = this.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(e){

preview.src = e.target.result;

preview.style.display = "block";

}

reader.readAsDataURL(file);

}

});

/* ================= PUBLISH NFT ================= */

function publishNFT(){

alert(
"NFT published successfully!\n\n" +
"This is currently a demo version."
);

}

</script>

</body>

</html>
